<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://kit.fontawesome.com/64d58efce2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Đăng nhập Thư Viện</title>
  </head>

  <body>
    <div class="container">
      <div class="forms-container">
        <div class="signin-signup">

          <!-- ADMIN -->
          <form action="#" class="sign-in-form">
            <h2 class="title">Admin Login</h2>

            <button type="button" id="adminGoogleLogin" class="btn">
              <i class="fab fa-google"></i> Login with Google
            </button>
          </form>

          <!-- STUDENT / TEACHER -->
          <form action="#" class="sign-up-form">
            <h2 class="title">Student & Teacher</h2>

            <button type="button" id="googleLogin" class="btn">
              <i class="fab fa-google"></i> Login with Google
            </button>

          </form>

        </div>
      </div>

      <!-- PANELS -->
      <div class="panels-container">
        <div class="panel left-panel">
          <div class="content">
            <h3>Xin chào!</h3>
            <p>Học sinh và Giáo viên đăng nhập hệ thống Thư viện tại đây bằng tài khoản Google.</p>
            <button class="btn transparent" id="sign-up-btn">
              Student / Teacher
            </button>
          </div>
          <img src="log.svg" class="image" alt="" />
        </div>

        <div class="panel right-panel">
          <div class="content">
            <h3>Admin Panel</h3>
            <p>Khu vực đăng nhập dành riêng cho Quản trị viên (Thủ thư).</p>
            <button class="btn transparent" id="sign-in-btn">
              Admin Login
            </button>
          </div>
          <img src="register.svg" class="image" alt="" />
        </div>
      </div>
    </div>

    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getAuth, 
  signInWithPopup, 
  GoogleAuthProvider,
  setPersistence,
  browserSessionPersistence,
  signOut
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEdkzclcyqLDQv8kRUBN4l71AggHn1jKc",
  authDomain: "student-admin-system-f92e7.firebaseapp.com",
  projectId: "student-admin-system-f92e7",
  storageBucket: "student-admin-system-f92e7.firebasestorage.app",
  messagingSenderId: "693112425401",
  appId: "1:693112425401:web:dd2285bd4eada7a6750468"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// 👉 UID ADMIN
const ADMIN_UID = "idn9CUepaSOJOAL0Ag3ezSoQE4m1";

// PANEL SWITCH
const sign_in_btn = document.querySelector("#sign-in-btn");
const sign_up_btn = document.querySelector("#sign-up-btn");
const container = document.querySelector(".container");

sign_up_btn.addEventListener("click", () => {
  container.classList.add("sign-up-mode");
});

sign_in_btn.addEventListener("click", () => {
  container.classList.remove("sign-up-mode");
});


// ================= ADMIN GOOGLE LOGIN =================
document.getElementById("adminGoogleLogin")
.addEventListener("click", async () => {

  try {

    await setPersistence(auth, browserSessionPersistence);

    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    if (user.uid === ADMIN_UID) {

      Swal.fire({
        title: "Đăng nhập thành công!",
        icon: "success",
        showConfirmButton: false,
        timer: 1500
      }).then(() => {
        window.location.href = "adminpage.html";
      });

    } else {

      await signOut(auth);

      Swal.fire({
        title: "Từ chối truy cập",
        text: "Bạn không có quyền Admin!",
        icon: "error",
        confirmButtonText: "OK"
      });

    }

  } catch (error) {

    console.error("Admin login error:", error);

    Swal.fire({
      title: "Lỗi đăng nhập",
      text: error.message,
      icon: "error"
    });

  }
});


// ================= STUDENT / TEACHER GOOGLE LOGIN =================
document.getElementById("googleLogin")
.addEventListener("click", async () => {

  try {

    await setPersistence(auth, browserSessionPersistence);

    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    // 🔥 Nếu user chưa tồn tại (login lần đầu)
    if (!snap.exists()) {
      await setDoc(userRef, {
        name: user.displayName,
        email: user.email,
        role: "student",
        status: "active",
        online: true,
        createdAt: serverTimestamp(),
        lastSeen: serverTimestamp()
      });
    } else {
      const data = snap.data();

      // 🚨 Nếu bị block → không cho login
      if (data.status === "blocked") {
        await signOut(auth);
        Swal.fire({
          title: "Tài khoản bị khóa",
          text: "Tài khoản của bạn đã bị Admin chặn truy cập.",
          icon: "error"
        });
        return;
      }

      // 🔥 Chỉ update online, KHÔNG đụng status
      await setDoc(userRef, {
        online: true,
        lastSeen: serverTimestamp()
      }, { merge: true });
    }

    // ==========================================
    // LOGIC PHÂN QUYỀN ĐIỀU HƯỚNG BẰNG EMAIL
    // ==========================================
    const email = user.email ? user.email.toLowerCase().trim() : "";
    
    // DANH SÁCH EMAIL GIÁO VIÊN
    const teacherEmails = [
        "lop12a3@nhc.edu.vn", 
        "bckapp001@gmail.com", 
        "hieutruong@nhc.edu.vn",
        "thuthu@nhc.edu.vn"
    ];
    
    const isTeacher = teacherEmails.includes(email) || email.endsWith("@gv.nhc.edu.vn");
    
    // MẶC ĐỊNH LÀ VÀO TRANG HỌC SINH
    let targetPage = "studentpage.html"; 
    
    // CHỈ CHUYỂN TRANG NẾU ĐÚNG LÀ GIÁO VIÊN VÀ KHÔNG PHẢI ADMIN
    if (isTeacher && user.uid !== ADMIN_UID) {
        targetPage = "teacherpage.html"; 
    }
    // Nếu là Admin thì targetPage vẫn giữ nguyên là "studentpage.html", không bị ép nhảy đi đâu nữa!

    // Hiển thị Popup Đăng nhập
    Swal.fire({
      title: "Đăng nhập thành công!",
      icon: "success",
      showConfirmButton: false,
      timer: 1500
    }).then(() => {
      window.location.href = targetPage;
    });

  } catch (error) {

    console.error("Student/Teacher login error:", error);

    Swal.fire({
      title: "Lỗi đăng nhập",
      text: error.message,
      icon: "error"
    });

  }

});

    </script>
  </body>
</html>
