
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Feedback</title>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<style>

/* Fix spacing chuẩn */
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.8), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.6), transparent 40%),
    linear-gradient(135deg,#f4f7fb,#e9eef5);
  padding:20px;
}

/* Card */
.card{
  width:100%;
  max-width:480px;
  padding:40px 30px;
  border-radius:35px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(35px) saturate(180%);
  -webkit-backdrop-filter:blur(35px) saturate(180%);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:
    0 30px 80px rgba(0,0,0,.12),
    inset 0 2px 10px rgba(255,255,255,.8);
}

/* Title */
h2{
  text-align:center;
  margin-bottom:25px;
  font-weight:600;
  color:#111;
}

/* Inputs */
input, select, textarea{
  width:100%;
  padding:14px 18px;
  margin-bottom:18px;
  border:none;
  border-radius:22px;
  background:rgba(255,255,255,0.85);
  font-size:14px;
  outline:none;
  transition:.25s;
  box-shadow:
    inset 0 3px 8px rgba(0,0,0,.05);
}

input:focus, select:focus, textarea:focus{
  background:#fff;
  box-shadow:
    0 0 0 3px rgba(255,255,255,.8),
    0 8px 25px rgba(0,0,0,.08);
  transform:translateY(-2px);
}

textarea{
  resize:none;
  height:110px;
}

/* Button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  background:
    linear-gradient(145deg,#ffffff,#f1f4f9);
  box-shadow:
    0 10px 25px rgba(0,0,0,.1),
    inset 0 2px 8px rgba(255,255,255,.9);
  transition:.25s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:
    0 15px 35px rgba(0,0,0,.15);
}

</style>
</head>
<body>

<div class="card">
  <h2>Gửi Feedback</h2>

  <input type="text" id="name" placeholder="Tên" disabled>
  <input type="email" id="email" placeholder="Email" disabled>

  <input type="text" id="class" placeholder="Lớp (VD: 12A1)" required>

  <select id="type">
    <option value="">-- Chọn loại feedback --</option>
    <option value="bug">Báo lỗi</option>
    <option value="suggestion">Đề xuất</option>
    <option value="other">Khác</option>
  </select>

  <textarea id="content" placeholder="Nhập nội dung..."></textarea>

  <button onclick="sendFeedback()">Gửi Feedback</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 THAY config của bạn vào đây */
const firebaseConfig = {
  apiKey: "AIzaSyCEdkzclcyqLDQv8kRUBN4l71AggHn1jKc",
  authDomain: "student-admin-system-f92e7.firebaseapp.com",
  projectId: "student-admin-system-f92e7",
  storageBucket: "student-admin-system-f92e7.firebasestorage.app",
  messagingSenderId: "693112425401",
  appId: "1:693112425401:web:dd2285bd4eada7a6750468"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* Lấy info user */
onAuthStateChanged(auth, (user)=>{
  if(user){
    document.getElementById("name").value = user.displayName || "";
    document.getElementById("email").value = user.email || "";
  } else {
    Swal.fire({
      icon:"warning",
      title:"Chưa đăng nhập",
      text:"Vui lòng đăng nhập bằng Google trước!"
    });
  }
});

/* Validate lớp */
function validateClass(className){
  return /^[0-9]{1,2}[A-Za-z][0-9]{1,2}$/.test(className);
}

window.sendFeedback = async function(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const className = document.getElementById("class").value.trim();
  const type = document.getElementById("type").value;
  const content = document.getElementById("content").value.trim();

  if(!validateClass(className)){
    Swal.fire({
      icon:"error",
      title:"Lớp không hợp lệ",
      text:"Ví dụ đúng: 12A1, 11B2..."
    });
    return;
  }

  if(!type || !content){
    Swal.fire({
      icon:"error",
      title:"Thiếu thông tin",
      text:"Vui lòng điền đầy đủ nội dung!"
    });
    return;
  }

  try{
    await addDoc(collection(db,"feedback"),{
      name,
      email,
      class:className,
      type,
      content,
      createdAt:serverTimestamp()
    });

    Swal.fire({
      icon:"success",
      title:"🎉 Gửi thành công!",
      text:"Cảm ơn bạn đã đóng góp ý kiến.",
      confirmButtonColor:"#ffffff",
      backdrop:`rgba(0,0,0,0.3)`
    });

    document.getElementById("class").value="";
    document.getElementById("type").value="";
    document.getElementById("content").value="";
  }
  catch(error){
    Swal.fire({
      icon:"error",
      title:"Lỗi",
      text:error.message
    });
  }
}
</script>

</body>
</html>
